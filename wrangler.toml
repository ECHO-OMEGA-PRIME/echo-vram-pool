name = "echo-vram-pool"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
CLUSTER_NAME = "ECHO_VRAM_POOL"
VRAM_POOL_VERSION = "1.0.0"

# Set via `wrangler secret put`
# ECHO_API_KEY = "..."           # Auth key for API requests
# COORDINATOR_URL = "..."        # LAN coordinator URL (via tunnel)

[[d1_databases]]
binding = "DB"
database_name = "echo-vram-pool"
database_id = "8c314e20-3faf-4bc5-bace-5a0d3bedd4d2"

[[kv_namespaces]]
binding = "CACHE"
id = "a354aa37d9ed4154b205821cace2ceb7"

[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "echo_metrics"
